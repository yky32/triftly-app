name: PR Flutter Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  flutter-tests:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: |
          echo "🔍 Running flutter analyze..."
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run flutter test (if tests exist)
        run: |
          echo "🧪 Running flutter test..."
          flutter test || echo "⚠️ No tests found or tests failed (non-blocking)"
