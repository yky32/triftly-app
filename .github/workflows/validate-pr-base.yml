name: PR Flutter Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  supabase-migrations:
    name: Supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN repository secret"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_DB_PASSWORD repository secret"
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing SUPABASE_URL repository secret"
            exit 1
          fi

          PROJECT_REF="${SUPABASE_URL#https://}"
          PROJECT_REF="${PROJECT_REF#http://}"
          PROJECT_REF="${PROJECT_REF%.supabase.co}"
          PROJECT_REF="${PROJECT_REF%/}"

          echo "Linking project ref: $PROJECT_REF"
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --yes

  flutter-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: |
          echo "🔍 Running flutter analyze..."
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run flutter test (if tests exist)
        run: |
          echo "🧪 Running flutter test..."
          flutter test || echo "⚠️ No tests found or tests failed (non-blocking)"
