name: triftly
description: "Triftly — Global Travel OS. Explore, Plan, Spend."
publish_to: 'none'
version: 1.1.0+113

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.6.0

  # Supabase
  supabase_flutter: ^2.6.0

  # Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Forms
  flutter_form_builder: ^10.0.0
  form_builder_validators: ^11.0.0

  # Network
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.5

  # Money
  decimal: ^3.0.2

  # Share
  nanoid: ^1.0.0
  share_plus: ^10.0.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1

  # UI
  animations: ^2.0.11
  skeletonizer: ^2.1.3
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8
  intl: any
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Black.otf
          weight: 900
        - asset: assets/fonts/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/Satoshi-Light.otf
          weight: 300

  assets:
    - env/
    - assets/fonts/
    - assets/lottie/
    - assets/mock/
